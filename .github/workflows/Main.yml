name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # Generates the missing android/ folder (Gradle project,
      # manifest, etc.) fresh on every build, since we don't have
      # Flutter installed locally to run this ourselves.
      - name: Generate missing platform folders
        run: flutter create --platforms=android --project-name=coachfit --org com.coachfit .

      # Fix: some of our plugins need a newer Kotlin plugin version
      # than what Flutter's default template ships with. This finds
      # the Kotlin version line in the generated settings.gradle and
      # bumps it to 1.9.22.
      - name: Patch Kotlin version
        run: |
          sed -i 's/org.jetbrains.kotlin.android" version "[0-9.]*"/org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: coachfit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
