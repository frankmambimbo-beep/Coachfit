name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # --project-name is added explicitly because Flutter tries to
      # guess the name from the repo's folder name, which may contain
      # capital letters or other characters that aren't valid Dart
      # package names (must be lowercase_with_underscores).
      - name: Generate missing platform folders
        run: flutter create --platforms=android --project-name=coachfit --org com.coachfit .

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: coachfit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
