# GitHub Actions workflow: builds a debug APK every time you push code.
name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # This is the fix: generates the missing android/ folder (Gradle
      # project, manifest, etc.) right here in CI, since we don't have
      # Flutter installed locally to run this ourselves. It's safe to
      # run on an existing project — it only fills in missing platform
      # folders and won't touch our lib/ code or pubspec.yaml.
      - name: Generate missing platform folders
        run: flutter create --platforms=android --org com.coachfit .

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: coachfit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
